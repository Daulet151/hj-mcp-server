name: Deploy to DigitalOcean VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${VPS_USER}@${VPS_HOST} 'bash -s' <<'EOF'
          set -e

          cd ~/hj-mcp-server

          echo "=== Fetching latest code ==="
          git fetch origin main
          git reset --hard origin/main
          echo "=== Git HEAD: $(git rev-parse --short HEAD) ==="

          echo "=== Installing dependencies ==="
          source venv/bin/activate
          pip install -r requirements.txt --quiet

          echo "=== Restarting service ==="
          systemctl restart slackbot

          sleep 3
          systemctl is-active slackbot

          echo "=== Deployment completed ==="
          EOF

      - name: Notify on success
        if: success()
        run: echo "Deployed to production"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed"
